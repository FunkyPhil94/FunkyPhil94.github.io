<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NATO [GBR] – Pinboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav id="mainNav"><a class="nav-logo" href="index.html">NATO [GBR]</a><ul></ul></nav>

  <div class="page fade-up">
    <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <div>
        <div class="page-label">Internal Announcements</div>
        <div class="page-title">Pinboard</div>
        <div class="page-divider"></div>
      </div>
      <button class="btn btn-gold" onclick="openModal('pinModal')">+ New Post</button>
    </div>

    <div id="pinList" style="display:flex;flex-direction:column;gap:1rem"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="pinModal">
    <div class="modal">
      <h3 id="pinModalTitle">New Announcement</h3>
      <input type="hidden" id="editPinId"/>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="pinTitle" placeholder="Announcement title…"/>
      </div>
      <div class="form-group">
        <label>Body</label>
        <textarea id="pinBody" rows="5" placeholder="Write your announcement here…"></textarea>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="pinPriority">
          <option value="normal">Normal</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
        </select>
      </div>
      <div class="form-group">
        <label>Author</label>
        <select id="pinAuthor">
          <option value="Pingwing">Pingwing</option>
          <option value="Finnegan">Finnegan</option>
          <option value="MonkeyGod">MonkeyGod</option>
          <option value="GettoBird">GettoBird</option>
          <option value="Kait_See">Kait_See</option>
          <option value="Squirtle">Squirtle</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('pinModal')">Cancel</button>
        <button class="btn btn-gold"  onclick="savePin()">Save</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
<script>
    buildNav("pinboard.html");
    const PRIORITY_BADGE = {
      urgent: '<span class="badge badge-red">Urgent</span>',
      high:   '<span class="badge badge-gold">High</span>',
      normal: '<span class="badge badge-muted">Normal</span>',
    };

    function render() {
      const pins = DB.get("pins").slice().reverse();
      document.getElementById("pinList").innerHTML = pins.length
        ? pins.map(p => `
          <div class="card">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.8rem">
              <div style="display:flex;align-items:center;gap:.7rem">
                ${PRIORITY_BADGE[p.priority] || PRIORITY_BADGE.normal}
                <span style="font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:.03em">${p.title}</span>
              </div>
              <div style="display:flex;gap:.5rem">
                <button class="btn btn-ghost" style="padding:.35rem .8rem;font-size:.72rem" onclick="editPin(${p.id})">Edit</button>
                <button class="btn btn-danger" style="padding:.35rem .8rem;font-size:.72rem" onclick="deletePin(${p.id})">Delete</button>
              </div>
            </div>
            <p style="font-size:.88rem;color:var(--muted);line-height:1.65;white-space:pre-wrap">${p.body}</p>
            <div style="margin-top:.9rem;font-size:.72rem;color:var(--muted);letter-spacing:.06em">
              Posted by <strong style="color:var(--text)">${p.author}</strong> · ${p.date}
            </div>
          </div>`).join("")
        : `<div style="color:var(--muted);font-size:.9rem">No announcements yet.</div>`;
    }

    function savePin() {
      const pins  = DB.get("pins");
      const id    = document.getElementById("editPinId").value;
      const entry = {
        id:       id ? Number(id) : nextId(pins),
        title:    document.getElementById("pinTitle").value.trim()    || "Untitled",
        body:     document.getElementById("pinBody").value.trim()     || "",
        priority: document.getElementById("pinPriority").value,
        author:   document.getElementById("pinAuthor").value.trim()   || "Unknown",
        date:     today(),
      };
      if (id) {
        const idx = pins.findIndex(p => p.id === Number(id));
        pins[idx] = entry;
      } else {
        pins.push(entry);
      }
      DB.set("pins", pins);
      closeModal("pinModal");
      resetPinForm();
      render();
    }

    function editPin(id) {
      const p = DB.get("pins").find(x => x.id === id);
      document.getElementById("editPinId").value       = p.id;
      document.getElementById("pinTitle").value        = p.title;
      document.getElementById("pinBody").value         = p.body;
      document.getElementById("pinPriority").value     = p.priority;
      document.getElementById("pinAuthor").value       = p.author;
      document.getElementById("pinModalTitle").textContent = "Edit Announcement";
      openModal("pinModal");
    }

    function deletePin(id) {
      if (!confirm("Delete this announcement?")) return;
      DB.set("pins", DB.get("pins").filter(p => p.id !== id));
      render();
    }

    function resetPinForm() {
      ["editPinId","pinTitle","pinBody","pinAuthor"].forEach(i => document.getElementById(i).value = "");
      document.getElementById("pinPriority").value = "normal";
      document.getElementById("pinModalTitle").textContent = "New Announcement";
    }

    document.getElementById("pinModal").addEventListener("click", e => { if (e.target === document.getElementById("pinModal")) { closeModal("pinModal"); resetPinForm(); } });

    render();
</script>
</body>
</html>
