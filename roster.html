<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NATO [GBR] – Member Roster</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>

  <style>
    .warning-cell { display:flex; align-items:center; gap:.4rem; }
    .warn-pip { width:9px; height:9px; border-radius:50%; display:inline-block; flex-shrink:0; }
    .warn-0  { background:rgba(76,175,125,.25);  border:1px solid var(--green); }
    .warn-1  { background:rgba(201,168,76,.3);   border:1px solid var(--gold); }
    .warn-2p { background:rgba(224,82,82,.3);    border:1px solid var(--red); }

    .warn-btn {
      width:20px; height:20px; border-radius:50%; border:none; cursor:pointer;
      font-size:.72rem; font-weight:700; display:inline-flex; align-items:center;
      justify-content:center; transition:all .15s; flex-shrink:0;
    }
    .warn-btn.add { background:rgba(224,82,82,.15); color:var(--red); }
    .warn-btn.add:hover { background:rgba(224,82,82,.3); }
    .warn-btn.sub { background:rgba(76,175,125,.15); color:var(--green); }
    .warn-btn.sub:hover { background:rgba(76,175,125,.3); }

    .rank-r5 { color:#f0cc72; }
    .rank-r4 { color:#7eb8f7; }
    .rank-r3 { color:#a78bfa; }
    .rank-r2 { color:#6ee7b7; }
    .rank-r1 { color:#6b7280; }

    .search-bar {
      background:var(--surface); border:1px solid var(--border); border-radius:3px;
      color:var(--text); font-family:'Inter',sans-serif; font-size:.88rem;
      padding:.55rem 1rem; outline:none; width:100%; max-width:320px;
      transition:border-color .2s;
    }
    .search-bar:focus { border-color:var(--gold); }
    .toolbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1.5rem; }
  </style>
</head>

<body>
  <nav id="mainNav"><a class="nav-logo" href="index.html">NATO [GBR]</a><ul></ul></nav>

  <div class="page fade-up">
    <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem">
      <div>
        <div class="page-label">Guild Management</div>
        <div class="page-title">Member Roster</div>
        <div class="page-divider"></div>
      </div>
      <button class="btn btn-gold" data-requires-auth="true" onclick="openMemberModal()">+ Add Member</button>
    </div>

    <div class="stat-grid" id="rosterStats" style="margin-bottom:1.8rem"></div>

    <div class="toolbar">
      <input class="search-bar" type="text" id="searchInput" placeholder="Search by name…" oninput="render()"/>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-ghost" style="padding:.4rem .85rem;font-size:.75rem" onclick="setFilter('')">All</button>
        <button class="btn btn-ghost" style="padding:.4rem .85rem;font-size:.75rem;color:#f0cc72;border-color:rgba(240,204,114,.3)" onclick="setFilter('r5')">R5</button>
        <button class="btn btn-ghost" style="padding:.4rem .85rem;font-size:.75rem;color:#7eb8f7;border-color:rgba(126,184,247,.3)" onclick="setFilter('r4')">R4</button>
        <button class="btn btn-ghost" style="padding:.4rem .85rem;font-size:.75rem;color:#a78bfa;border-color:rgba(167,139,250,.3)" onclick="setFilter('r3')">R3</button>
        <button class="btn btn-ghost" style="padding:.4rem .85rem;font-size:.75rem;color:#6ee7b7;border-color:rgba(110,231,183,.3)" onclick="setFilter('r2')">R2</button>
        <button class="btn btn-ghost" style="padding:.4rem .85rem;font-size:.75rem" onclick="setFilter('r1')">R1</button>
        <button class="btn btn-ghost" style="padding:.4rem .85rem;font-size:.75rem;color:var(--red);border-color:rgba(224,82,82,.3)" onclick="setFilter('warned')">⚠ Warned</button>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Rank</th>
              <th>Power</th>
              <th title="Mythic Plunder warnings">⚔ Mythic</th>
              <th title="Castle Crashers GE warnings">🏰 Castle</th>
              <th>Notes</th>
              <th style="width:120px"></th>
            </tr>
          </thead>
          <tbody id="rosterBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add / Edit Member Modal -->
  <div class="modal-overlay" id="memberModal">
    <div class="modal" style="max-width:520px">
      <h3 id="memberModalTitle">Add Member</h3>
      <input type="hidden" id="editMemberId"/>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 1rem">
        <div class="form-group">
          <label>Player Name</label>
          <input type="text" id="mName" placeholder="e.g. DarkBlade"/>
        </div>
        <div class="form-group">
          <label>Power</label>
          <input type="number" id="mPower" min="0" step="1" placeholder="e.g. 34000000"/>
        </div>
      </div>

      <div class="form-group">
        <label>Rank</label>
        <select id="mRank">
          <option value="r5">R5 – Guild Leader</option>
          <option value="r4">R4 – Vice Leader</option>
          <option value="r3">R3 – Elite</option>
          <option value="r2">R2 – Member</option>
          <option value="r1" selected>R1 – Recruit</option>
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 1rem">
        <div class="form-group">
          <label>⚔ Mythic Warnings</label>
          <input type="number" id="mWarnMythic" min="0" value="0"/>
        </div>
        <div class="form-group">
          <label>🏰 Castle Warnings</label>
          <input type="number" id="mWarnCastle" min="0" value="0"/>
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="mNotes" rows="3" placeholder="Optional notes…"></textarea>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('memberModal');resetMemberForm()">Cancel</button>
        <button class="btn btn-gold" onclick="saveMember()">Save</button>
      </div>
    </div>
  </div>

  <!-- ✅ Supabase CDN MUST be before script.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>

  <script>
    // ---- Page init ----
    buildNav("roster.html");
    applyAuthUI();

    const TABLE = "members";

    const RANK_LABEL = { r5:"R5 – Leader", r4:"R4 – Vice", r3:"R3 – Elite", r2:"R2 – Member", r1:"R1 – Recruit" };
    const RANK_CLASS = { r5:"rank-r5", r4:"rank-r4", r3:"rank-r3", r2:"rank-r2", r1:"rank-r1" };
    const rankOrder  = { r5:0, r4:1, r3:2, r2:3, r1:4 };

    let rankFilter = "";
    let currentMembers = [];

    function getSb() {
      if (window.sb) return window.sb;
      showToast("Supabase nicht geladen (CDN vor script.js prüfen).", "error", 7000);
      console.error("Supabase client 'sb' missing. Ensure CDN is loaded BEFORE script.js and script.js sets window.sb.");
      return null;
    }

    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function fmtPower(n){
      const x = Number(n);
      if (!Number.isFinite(x)) return "–";
      return x.toLocaleString("en-US");
    }

    function setFilter(f) { rankFilter = f; render(); }

    function warnClass(n) { return n===0 ? "warn-0" : n===1 ? "warn-1" : "warn-2p"; }

    function warnCell(memberId, col, count, canEdit) {
      return `<div class="warning-cell">
        <span class="warn-pip ${warnClass(count)}"></span>
        <span style="min-width:1.1rem;text-align:center;font-weight:600;font-size:.85rem">${count}</span>
        ${canEdit ? `
          <button class="warn-btn add" title="Add warning" onclick="adjustWarn(${memberId},'${col}',1)">+</button>
          <button class="warn-btn sub" title="Remove warning" onclick="adjustWarn(${memberId},'${col}',-1)">−</button>
        ` : ``}
      </div>`;
    }

    async function fetchMembers() {
      const sbClient = getSb();
      if (!sbClient) return [];

      const { data, error } = await sbClient
        .from(TABLE)
        .select("id,name,rank,power,warnings_mythic,warnings_castle,notes,created_at")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        showToast("Fehler beim Laden der Member.", "error", 4500);
        return [];
      }
      return data || [];
    }

    function render() {
      const canEdit = isAuthed();

      const search = (document.getElementById("searchInput").value || "").toLowerCase().trim();
      let members = (currentMembers || []).slice();

      if (search) members = members.filter(m => String(m.name || "").toLowerCase().includes(search));

      if (rankFilter === "warned") {
        members = members.filter(m => (m.warnings_mythic||0) > 0 || (m.warnings_castle||0) > 0);
      } else if (rankFilter) {
        members = members.filter(m => (String(m.rank||"").toLowerCase() === rankFilter));
      }

      members.sort((a,b) => (rankOrder[String(a.rank||"").toLowerCase()] ?? 99) - (rankOrder[String(b.rank||"").toLowerCase()] ?? 99));

      const all = currentMembers || [];
      const warnedCount = all.filter(m => (m.warnings_mythic||0) > 0 || (m.warnings_castle||0) > 0).length;
      const r45 = all.filter(m => {
        const r = String(m.rank||"").toLowerCase();
        return r==="r5" || r==="r4";
      }).length;

      document.getElementById("rosterStats").innerHTML = `
        <div class="stat-card"><div class="s-label">Total Members</div><div class="s-value">${all.length}</div></div>
        <div class="stat-card"><div class="s-label">R4 / R5</div><div class="s-value">${r45}</div></div>
        <div class="stat-card"><div class="s-label">With Warnings</div><div class="s-value" style="color:var(--red)">${warnedCount}</div></div>
      `;

      document.getElementById("rosterBody").innerHTML = members.length
        ? members.map(m => {
            const rankKey = String(m.rank||"r1").toLowerCase();
            const rc = RANK_CLASS[rankKey] || "rank-r1";
            const rl = RANK_LABEL[rankKey] || String(m.rank || "").toUpperCase();
            const totalWarn = (m.warnings_mythic||0) + (m.warnings_castle||0);

            return `<tr>
              <td>${escapeHtml(m.name || "")}${totalWarn>0?` <span style="color:var(--red);font-size:.75rem">⚠</span>`:""}</td>
              <td><span class="${rc}" style="font-size:.78rem;font-weight:700;letter-spacing:.06em">${escapeHtml(rl)}</span></td>
              <td style="color:var(--text);font-weight:600">${fmtPower(m.power)}</td>
              <td>${warnCell(m.id, "warnings_mythic", m.warnings_mythic||0, canEdit)}</td>
              <td>${warnCell(m.id, "warnings_castle", m.warnings_castle||0, canEdit)}</td>
              <td style="font-size:.78rem;color:var(--muted);max-width:220px">${escapeHtml(m.notes || "–")}</td>
              <td>
                ${canEdit ? `
                  <div style="display:flex;gap:.4rem">
                    <button class="btn btn-ghost" style="padding:.3rem .6rem;font-size:.7rem" onclick="editMember(${m.id})">Edit</button>
                    <button class="btn btn-danger" style="padding:.3rem .6rem;font-size:.7rem" onclick="deleteMember(${m.id})">✕</button>
                  </div>
                ` : ``}
              </td>
            </tr>`;
          }).join("")
        : `<tr><td colspan="7" style="color:var(--muted);text-align:center;padding:2rem">No members found.</td></tr>`;
    }

    async function adjustWarn(id, col, delta) {
      if (!requireAuthOrAlert()) return;

      const sbClient = getSb();
      if (!sbClient) return;

      const m = currentMembers.find(x => x.id === id);
      if (!m) return;

      const nextVal = Math.max(0, (Number(m[col]) || 0) + delta);

      const { error } = await sbClient
        .from(TABLE)
        .update({ [col]: nextVal })
        .eq("id", id);

      if (error) {
        console.error(error);
        showToast("Fehler beim Speichern der Warnings.", "error", 4500);
        return;
      }

      m[col] = nextVal;
      render();
    }

    function openMemberModal() {
      if (!requireAuthOrAlert()) return;
      resetMemberForm();
      openModal("memberModal");
    }

    async function saveMember() {
      if (!requireAuthOrAlert()) return;

      const sbClient = getSb();
      if (!sbClient) return;

      const id = (document.getElementById("editMemberId").value || "").trim();

      const name = (document.getElementById("mName").value || "").trim() || "Unknown";
      const rank = (document.getElementById("mRank").value || "r1").toLowerCase();

      const powerRaw = (document.getElementById("mPower").value || "").trim();
      const powerNum = powerRaw === "" ? null : Number(powerRaw);
      const power = Number.isFinite(powerNum) ? powerNum : null;

      const payload = {
        name,
        rank,
        power,
        warnings_mythic: Number(document.getElementById("mWarnMythic").value) || 0,
        warnings_castle: Number(document.getElementById("mWarnCastle").value) || 0,
        notes: (document.getElementById("mNotes").value || "").trim(),
      };

      // ✅ IMPORTANT: bei identity-id NICHT upsert mit id für neue Zeilen
      let error = null;

      if (id) {
        // update existing
        const res = await sbClient.from(TABLE).update(payload).eq("id", Number(id));
        error = res.error;
      } else {
        // insert new (ohne id)
        const res = await sbClient.from(TABLE).insert(payload);
        error = res.error;
      }

      if (error) {
        console.error(error);
        showToast("Fehler beim Speichern des Members.", "error", 5500);
        return;
      }

      closeModal("memberModal");
      resetMemberForm();
      await loadAndRender();
      showToast("Saved.", "success");
    }

    function editMember(id) {
      if (!requireAuthOrAlert()) return;

      const m = currentMembers.find(x => x.id === id);
      if (!m) return;

      document.getElementById("editMemberId").value = m.id;
      document.getElementById("mName").value = m.name || "";
      document.getElementById("mRank").value = String(m.rank || "r1").toLowerCase();
      document.getElementById("mPower").value = (m.power ?? "");
      document.getElementById("mWarnMythic").value = m.warnings_mythic || 0;
      document.getElementById("mWarnCastle").value = m.warnings_castle || 0;
      document.getElementById("mNotes").value = m.notes || "";
      document.getElementById("memberModalTitle").textContent = "Edit Member";

      openModal("memberModal");
    }

    async function deleteMember(id) {
      if (!requireAuthOrAlert()) return;
      if (!confirm("Remove this member from the roster?")) return;

      const sbClient = getSb();
      if (!sbClient) return;

      const { error } = await sbClient.from(TABLE).delete().eq("id", id);
      if (error) {
        console.error(error);
        showToast("Fehler beim Löschen.", "error", 4500);
        return;
      }

      await loadAndRender();
      showToast("Deleted.", "success");
    }

    function resetMemberForm() {
      document.getElementById("editMemberId").value = "";
      document.getElementById("mName").value = "";
      document.getElementById("mRank").value = "r1";
      document.getElementById("mPower").value = "";
      document.getElementById("mWarnMythic").value = 0;
      document.getElementById("mWarnCastle").value = 0;
      document.getElementById("mNotes").value = "";
      document.getElementById("memberModalTitle").textContent = "Add Member";
    }

    document.getElementById("memberModal").addEventListener("click", e => {
      if (e.target.id === "memberModal") { closeModal("memberModal"); resetMemberForm(); }
    });

    async function loadAndRender() {
      currentMembers = await fetchMembers();
      render();
      applyAuthUI();
    }

    // initial load
    loadAndRender();
  </script>
</body>
</html>
