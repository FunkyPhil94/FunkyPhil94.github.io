<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NATO [GBR] – Relic</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>

<style>

.guide-filters{
  display:flex;
  gap:.5rem;
  flex-wrap:wrap;
  margin-bottom:1.5rem;
}

.filter-btn{
  padding:.35rem .85rem;
  border-radius:2px;
  font-size:.75rem;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  cursor:pointer;

  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);

  transition:all .2s;
}

.filter-btn.active,
.filter-btn:hover{
  border-color:var(--gold);
  color:var(--gold);
  background:rgba(201,168,76,.08);
}

.guides-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:1rem;
}

.guide-card{
  display:flex;
  flex-direction:column;
  gap:.5rem;
}

.guide-card h3{
  font-family:'Rajdhani',sans-serif;
  font-size:1.1rem;
  font-weight:700;
  letter-spacing:.03em;
  text-transform:uppercase;
}

.guide-card p{
  font-size:.84rem;
  color:var(--muted);
  line-height:1.6;
  flex:1;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.guide-meta{
  font-size:.7rem;
  color:var(--muted);
  letter-spacing:.06em;
}

.guide-actions{
  display:flex;
  gap:.5rem;
  margin-top:.4rem;
  flex-wrap:wrap;
}


/* BACK BUTTON */

.back-row{
  margin-bottom:1rem;
}

.back-btn{
  display:inline-flex;
  align-items:center;
  gap:.45rem;
  padding:.38rem .8rem;
  border:1px solid var(--border);
  border-radius:4px;
  text-decoration:none;
  color:var(--muted);
  font-size:.78rem;
  letter-spacing:.06em;
  text-transform:uppercase;
  transition:border-color .2s, background .2s, color .2s;
}

.back-btn:hover{
  border-color:var(--gold);
  background:rgba(201,168,76,.06);
  color:var(--gold);
}


/* VIEW MODAL */

#viewBody{
  font-size:.9rem;
  line-height:1.75;
  color:var(--muted);
  white-space:pre-wrap;
}

#viewAttachment{
  margin-top:1.2rem;
}

</style>
</head>

<body>

<nav id="mainNav">
<a class="nav-logo" href="index.html">NATO [GBR]</a>
<ul></ul>
</nav>


<div class="page fade-up">

<div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem">

<div>
<div class="page-label">Relic information</div>
<div class="page-title">Relic</div>
<div class="page-divider"></div>
</div>

<button class="btn btn-gold" data-requires-auth="true" onclick="openItemModal()">+ New Relic</button>

</div>


<!-- BACK BUTTON -->

<div class="back-row">
<a href="guides.html" class="back-btn">← Back to Guides</a>
</div>


<div class="guide-filters" id="filterBar"></div>
<div class="guides-grid" id="itemsGrid"></div>

</div>



<!-- VIEW MODAL -->

<div class="modal-overlay" id="viewModal">

<div class="modal" style="max-width:620px;max-height:90vh;overflow-y:auto">

<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem">

<div>
<div id="viewCategory" style="font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem"></div>
<h3 id="viewTitle" style="margin:0;font-size:1.5rem"></h3>
<div id="viewMeta" style="font-size:.72rem;color:var(--muted);margin-top:.4rem;letter-spacing:.06em"></div>
</div>

<button class="btn btn-ghost" style="padding:.3rem .7rem;font-size:.72rem;flex-shrink:0" onclick="closeModal('viewModal')">✕</button>

</div>

<p id="viewBody"></p>
<div id="viewAttachment"></div>

</div>
</div>



<!-- EDIT MODAL -->

<div class="modal-overlay" id="itemModal">

<div class="modal" style="max-width:520px;max-height:90vh;overflow-y:auto">

<h3 id="itemModalTitle">New Relic</h3>

<input type="hidden" id="editId"/>


<div class="form-group">
<label>Title</label>
<input type="text" id="itemTitle"/>
</div>


<div class="form-group">
<label>Category</label>
<select id="itemCategory">
<option>Relic</option>
</select>
</div>


<div class="form-group">
<label>Content</label>
<textarea id="itemBody" rows="5"></textarea>
</div>


<div class="form-group">
<label>Author</label>
<select id="itemAuthor"></select>
</div>


<div class="modal-actions">

<button class="btn btn-ghost" onclick="closeModal('itemModal');resetForm()">Cancel</button>

<button class="btn btn-gold" onclick="saveItem()">Save</button>

</div>

</div>
</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

<script>

const TABLE="relics";

let activeFilter="All";
let currentItems=[];

buildNav("relic.html");
applyAuthUI();


(function initAuthors(){
const sel=document.getElementById("itemAuthor");
sel.innerHTML=AUTHORS.map(a=>`<option>${a}</option>`).join("");
})();


function categoriesFromItems(items){
const cats=items.map(x=>x.category).filter(Boolean);
return ["All",...new Set(cats)];
}


function renderFilters(){

const categories=categoriesFromItems(currentItems);

document.getElementById("filterBar").innerHTML=categories.map(c=>`

<button class="filter-btn ${c===activeFilter?'active':''}" onclick="setFilter('${c}')">
${c}
</button>

`).join("");

}


function setFilter(cat){

activeFilter=cat;

renderFilters();
renderGrid();

}


function renderGrid(){

const canEdit=isAuthed();

const items=currentItems.filter(x=>activeFilter==="All"||x.category===activeFilter);

document.getElementById("itemsGrid").innerHTML=items.length ?

items.map(it=>`

<div class="card guide-card">

<span class="badge badge-muted">${it.category}</span>

<h3>${it.title}</h3>

<p>${it.body}</p>

<div class="guide-meta">
By <strong style="color:var(--text)">${it.author}</strong> · ${it.date}
</div>

<div class="guide-actions">

<button class="btn btn-gold" style="padding:.35rem .8rem;font-size:.72rem" onclick="viewItem(${it.id})">
Read
</button>

${canEdit ? `

<button class="btn btn-ghost" style="padding:.35rem .8rem;font-size:.72rem" onclick="editItem(${it.id})">
Edit
</button>

<button class="btn btn-danger" style="padding:.35rem .8rem;font-size:.72rem" onclick="deleteItem(${it.id})">
Delete
</button>

` : ``}

</div>

</div>

`).join("")

: `<div style="color:var(--muted);font-size:.9rem">No relics found.</div>`;

}


async function loadAndRender(){

currentItems=await dbList(TABLE,{orderBy:"date",ascending:false});

renderFilters();
renderGrid();
applyAuthUI();

}

loadAndRender();

</script>

</body>
</html>
