<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>NATO [GBR] – Guild Events</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>

<style>
.import-card{
  display:grid;
  grid-template-columns:1.2fr .8fr auto;
  gap:.8rem;
  align-items:end;
}
@media(max-width:900px){
  .import-card{grid-template-columns:1fr;}
}

.small-help{
  font-size:.8rem;
  color:var(--muted);
}

.member-row{
  display:flex;
  gap:.5rem;
  flex-wrap:wrap;
  align-items:center;
}

.chip{
  border:1px solid var(--border);
  background:var(--surface2);
  border-radius:999px;
  padding:.25rem .6rem;
  font-size:.75rem;
  color:var(--muted);
}

.points-zero{ color:var(--muted); }
.points-pos{ font-weight:600; }

canvas{ max-height:380px; }

.sortable-th{
  cursor:pointer;
  user-select:none;
  transition:color .15s;
  white-space:nowrap;
}
.sortable-th:hover{
  color:var(--gold);
}
.sort-indicator{
  margin-left:.25rem;
  color:var(--gold);
  font-size:.7rem;
}

/* ── Rang-Spalte ── */
.rank-cell{ font-weight:700; white-space:nowrap; }
.rank-1   { color:#f0cc72; }
.rank-2   { color:#cfd8e3; }
.rank-3   { color:#d9a066; }
.rank-rest{ color:var(--muted); font-size:.85rem; }
</style>
</head>

<body>

<nav id="mainNav">
  <a class="nav-logo" href="index.html">NATO [GBR]</a>
  <ul></ul>
</nav>

<div class="page fade-up">

  <div class="page-header">
    <div>
      <div class="page-label">Analytics</div>
      <div class="page-title">Guild Events</div>
      <div class="page-divider"></div>
    </div>
  </div>

  <!-- EVENT SELECT -->
  <div class="card" style="margin-bottom:1.2rem">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <div>
        <div class="page-label">Event</div>
        <div class="small-help">Select guild event and timeframe</div>
      </div>

      <div class="form-group" style="min-width:260px;margin:0">
        <label>Event</label>
        <select id="eventSelect">
          <option value="guild_arms_race">Guild Arms Race (2026-03-07 → 2026-03-15)</option>
        </select>
      </div>
    </div>

    <div class="member-row" style="margin-top:.8rem">
      <span class="chip" id="eventRange">Range: –</span>
      <span class="chip" id="sortInfo">Sort: Total ↓</span>
    </div>
  </div>

  <!-- IMPORT -->
  <div class="card" data-requires-auth="true" style="margin-bottom:1.2rem">
    <div class="page-label">Upload Event Points</div>

    <div class="small-help" style="margin-top:.4rem">
      CSV format: <b>name,points</b>
    </div>

    <div class="import-card" style="margin-top:1rem">
      <div class="form-group" style="margin:0">
        <label>CSV File</label>
        <input type="file" id="csvFile" accept=".csv"/>
      </div>

      <div class="form-group" style="margin:0">
        <label>Event Date</label>
        <input type="date" id="eventDate"/>
      </div>

      <button class="btn btn-gold" id="uploadBtn" type="button">Import CSV</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stat-grid" id="eventStats" style="margin-bottom:1.2rem"></div>

  <!-- CHART -->
  <div class="card" style="margin-bottom:1.2rem">
    <div style="display:flex;justify-content:space-between">
      <div>
        <div class="page-label">Daily Guild Points</div>
        <div class="small-help">Total points earned per day</div>
      </div>
    </div>

    <div style="margin-top:1rem">
      <canvas id="eventChart"></canvas>
    </div>
  </div>

  <!-- TABLE -->
  <div class="card">
    <div class="page-label">Member Participation</div>

    <div class="table-wrap" style="margin-top:1rem">
      <table>
        <thead id="pointsHead"></thead>
        <tbody id="pointsBody"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
buildNav("guild_events.html");
applyAuthUI();

const EVENTS = {
  guild_arms_race: {
    start: "2026-03-07",
    end: "2026-03-15",
    label: "Guild Arms Race"
  }
};

const MEMBERS_TABLE = "members";
const EVENT_TABLE = "guild_event_points";

let members = [];
let chart = null;
let currentRows = [];
let currentDays = [];

let sortState = {
  key: "total",
  dir: "desc"
};

const eventSelect = document.getElementById("eventSelect");
const eventRange  = document.getElementById("eventRange");
const sortInfo    = document.getElementById("sortInfo");

const pointsHead = document.getElementById("pointsHead");
const pointsBody = document.getElementById("pointsBody");
const stats      = document.getElementById("eventStats");

function iso(d){
  return d.toISOString().slice(0,10);
}

function addDays(d,n){
  const x = new Date(d);
  x.setDate(x.getDate()+n);
  return x;
}

function dateRange(start,end){
  const arr = [];
  let d = new Date(start);
  while(iso(d) <= end){
    arr.push(iso(d));
    d = addDays(d,1);
  }
  return arr;
}

function fmt(n){
  return Number(n || 0).toLocaleString("en-US");
}

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#39;");
}

function updateSortInfo(){
  const dir   = sortState.dir === "desc" ? "↓" : "↑";
  const label = sortState.key === "total" ? "Total" : sortState.key.slice(5);
  sortInfo.textContent = `Sort: ${label} ${dir}`;
}

function setSort(key){
  if (sortState.key === key){
    sortState.dir = sortState.dir === "desc" ? "asc" : "desc";
  } else {
    sortState.key = key;
    sortState.dir = "desc";
  }
  updateSortInfo();
  renderTable(currentRows, currentDays);
}

function sortRows(rows){
  const arr    = [...rows];
  const factor = sortState.dir === "desc" ? -1 : 1;

  arr.sort((a,b) => {
    let av, bv;
    if (sortState.key === "total"){
      av = Number(a.total || 0);
      bv = Number(b.total || 0);
    } else {
      av = Number(a.days[sortState.key] || 0);
      bv = Number(b.days[sortState.key] || 0);
    }
    if (av < bv) return -1 * factor;
    if (av > bv) return  1 * factor;
    return a.name.localeCompare(b.name);
  });

  return arr;
}

function sortIndicatorFor(key){
  if (sortState.key !== key) return "";
  return `<span class="sort-indicator">${sortState.dir === "desc" ? "▼" : "▲"}</span>`;
}

// Statischer Rang (0-basiert) → Emoji für Top 3, Zahl danach
function rankHtml(rank){
  if (rank === 0) return `<span class="rank-cell rank-1">🥇 1</span>`;
  if (rank === 1) return `<span class="rank-cell rank-2">🥈 2</span>`;
  if (rank === 2) return `<span class="rank-cell rank-3">🥉 3</span>`;
  return `<span class="rank-cell rank-rest">${rank + 1}</span>`;
}

async function loadMembers(){
  const { data, error } = await sb
    .from(MEMBERS_TABLE)
    .select("id,name")
    .order("name");

  if (error){
    console.error(error);
    showToast("Members konnten nicht geladen werden.", "error");
    members = [];
    return;
  }
  members = data || [];
}

async function fetchPoints(eventKey,start,end){
  const { data, error } = await sb
    .from(EVENT_TABLE)
    .select("*")
    .eq("event_key", eventKey)
    .gte("event_date", start)
    .lte("event_date", end);

  if (error){
    console.error(error);
    showToast("Event points konnten nicht geladen werden.", "error");
    return [];
  }
  return data || [];
}

function renderStats(rows,days){
  let total  = 0;
  let active = 0;

  rows.forEach(r => {
    total += r.total;
    if (r.total > 0) active++;
  });

  const dayTotals  = days.map(day => rows.reduce((sum, r) => sum + (r.days[day] || 0), 0));
  const bestDayVal = dayTotals.length ? Math.max(...dayTotals) : 0;
  const bestDayIdx = dayTotals.findIndex(x => x === bestDayVal);
  const bestDay    = bestDayIdx >= 0 ? days[bestDayIdx] : "–";

  stats.innerHTML = `
    <div class="stat-card">
      <div class="s-label">Members</div>
      <div class="s-value">${rows.length}</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Active</div>
      <div class="s-value">${active}</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Total Points</div>
      <div class="s-value">${fmt(total)}</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Best Day</div>
      <div class="s-value" style="font-size:1.4rem">${bestDay === "–" ? "–" : bestDay.slice(5)}</div>
    </div>
  `;
}

function renderChart(rows,days){
  const totals = days.map(day => {
    let sum = 0;
    rows.forEach(r => sum += r.days[day]);
    return sum;
  });

  const ctx = document.getElementById("eventChart");
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: days.map(d => d.slice(5)),
      datasets: [{
        label: "Guild Points",
        data: totals,
        backgroundColor: "rgba(201,168,76,.7)",
        borderColor: "rgba(201,168,76,1)",
        borderWidth: 1
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color:"#aaa" } },
        y: { ticks: { color:"#aaa" } }
      }
    }
  });
}

function renderTable(rows, days){
  currentRows = rows;
  currentDays = days;

  // Statischen Rang einmalig nach Total berechnen — bleibt fix egal wie sortiert wird
  const rankMap = new Map();
  [...rows]
    .sort((a,b) => (b.total || 0) - (a.total || 0))
    .forEach((r, i) => rankMap.set(r.name, i));

  const sorted = sortRows(rows);

  pointsHead.innerHTML = `
    <tr>
      <th style="width:2.5rem">#</th>
      <th>Name</th>
      ${days.map(d => `
        <th class="sortable-th" onclick="setSort('${d}')">
          ${d.slice(5)}${sortIndicatorFor(d)}
        </th>
      `).join("")}
      <th class="sortable-th" onclick="setSort('total')">
        Total${sortIndicatorFor("total")}
      </th>
    </tr>
  `;

  pointsBody.innerHTML = sorted.map(r => `
    <tr>
      <td>${rankHtml(rankMap.get(r.name))}</td>
      <td>${escapeHtml(r.name)}</td>
      ${days.map(d => {
        const val = Number(r.days[d] || 0);
        return `<td class="${val ? "points-pos" : "points-zero"}">${fmt(val)}</td>`;
      }).join("")}
      <td style="font-weight:700">${fmt(r.total)}</td>
    </tr>
  `).join("");
}

async function render(){
  const eventKey = eventSelect.value;
  const conf     = EVENTS[eventKey];

  eventRange.innerText = `Range: ${conf.start} → ${conf.end}`;

  const days = dateRange(conf.start, conf.end);
  const data = await fetchPoints(eventKey, conf.start, conf.end);

  const byMember = {};

  members.forEach(m => {
    byMember[m.id] = { name: m.name, total: 0, days: {} };
    days.forEach(d => byMember[m.id].days[d] = 0);
  });

  data.forEach(r => {
    if (!byMember[r.member_id]) return;
    byMember[r.member_id].days[r.event_date] = Number(r.points || 0);
    byMember[r.member_id].total += Number(r.points || 0);
  });

  const rows = Object.values(byMember);

  renderStats(rows, days);
  renderChart(rows, days);
  renderTable(rows, days);
}

document.getElementById("uploadBtn").onclick = async () => {
  if (!requireAuthOrAlert()) return;

  const file     = document.getElementById("csvFile").files[0];
  const date     = document.getElementById("eventDate").value;
  const eventKey = eventSelect.value;

  if (!file || !date){
    showToast("Missing file/date", "error");
    return;
  }

  const text  = await file.text();
  const lines = text.trim().split(/\r?\n/);
  const rows  = lines.slice(1);
  const map   = {};

  rows.forEach(r => {
    const [name, points] = r.split(",");
    if (!name) return;
    map[name.trim().toLowerCase()] = Number((points || "").trim()) || 0;
  });

  const upserts = [];
  members.forEach(m => {
    const p = map[m.name.toLowerCase()] || 0;
    upserts.push({
      event_key:  eventKey,
      event_date: date,
      member_id:  m.id,
      points:     p
    });
  });

  const { error } = await sb
    .from(EVENT_TABLE)
    .upsert(upserts, { onConflict: "event_key,event_date,member_id" });

  if (error){
    console.error(error);
    showToast("Import failed", "error");
    return;
  }

  showToast("Event points imported", "success");
  render();
};

eventSelect.onchange = render;

(async () => {
  await loadMembers();
  document.getElementById("eventDate").value = new Date().toISOString().slice(0,10);
  updateSortInfo();
  render();
})();
</script>

</body>
</html>
