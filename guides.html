<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NATO [GBR] – Guides</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .guide-filters { display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .filter-btn {
      padding:.35rem .85rem; border-radius:2px; font-size:.75rem; font-weight:600;
      letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
      background:transparent; border:1px solid var(--border); color:var(--muted);
      transition:all .2s;
    }
    .filter-btn.active, .filter-btn:hover { border-color:var(--gold); color:var(--gold); background:rgba(201,168,76,.08); }
    .guides-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; }
    .guide-card  { display:flex; flex-direction:column; gap:.5rem; }
    .guide-card h3 { font-family:'Rajdhani',sans-serif; font-size:1.1rem; font-weight:700; letter-spacing:.03em; text-transform:uppercase; }
    .guide-card p  { font-size:.84rem; color:var(--muted); line-height:1.6; flex:1; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .guide-meta    { font-size:.7rem; color:var(--muted); letter-spacing:.06em; }
    .guide-actions { display:flex; gap:.5rem; margin-top:.4rem; flex-wrap:wrap; }
    .guide-thumb {
      width:100%; max-height:160px; object-fit:cover; border-radius:3px;
      border:1px solid var(--border); margin-bottom:.2rem;
    }
    .guide-pdf-link {
      display:inline-flex; align-items:center; gap:.4rem;
      font-size:.78rem; color:var(--blue); text-decoration:none;
      border:1px solid rgba(61,127,255,.25); border-radius:3px;
      padding:.3rem .7rem; transition:background .2s;
    }
    .guide-pdf-link:hover { background:rgba(61,127,255,.1); }

    /* Upload area */
    .upload-area {
      border:2px dashed var(--border); border-radius:4px;
      padding:1.2rem; text-align:center; cursor:pointer;
      transition:border-color .2s, background .2s;
      position:relative;
    }
    .upload-area:hover, .upload-area.dragover { border-color:var(--gold); background:rgba(201,168,76,.04); }
    .upload-area input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-area .ua-icon { font-size:1.5rem; margin-bottom:.3rem; }
    .upload-area .ua-label { font-size:.8rem; color:var(--muted); }
    .upload-preview { margin-top:.6rem; display:flex; align-items:center; gap:.6rem; }
    .upload-preview img { width:48px; height:48px; object-fit:cover; border-radius:3px; border:1px solid var(--border); }
    .upload-preview .up-name { font-size:.78rem; color:var(--text); }
    .upload-preview .up-remove { font-size:.72rem; color:var(--red); cursor:pointer; margin-left:auto; }

    /* View modal content */
    #viewBody { font-size:.9rem; line-height:1.75; color:var(--muted); white-space:pre-wrap; }
    #viewAttachment { margin-top:1.2rem; }
  </style>
</head>
<body>
  <nav id="mainNav"><a class="nav-logo" href="index.html">NATO [GBR]</a><ul></ul></nav>

  <div class="page fade-up">
    <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem">
      <div>
        <div class="page-label">Strategy & How-to</div>
        <div class="page-title">Guides</div>
        <div class="page-divider"></div>
      </div>
      <button class="btn btn-gold" onclick="openModal('guideModal')">+ New Guide</button>
    </div>

    <div class="guide-filters" id="filterBar"></div>
    <div class="guides-grid"  id="guidesGrid"></div>
  </div>

  <!-- View Modal -->
  <div class="modal-overlay" id="viewModal">
    <div class="modal" style="max-width:620px;max-height:90vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem">
        <div>
          <div id="viewCategory" style="font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem"></div>
          <h3 id="viewTitle" style="margin:0;font-size:1.5rem"></h3>
          <div id="viewMeta" style="font-size:.72rem;color:var(--muted);margin-top:.4rem;letter-spacing:.06em"></div>
        </div>
        <button class="btn btn-ghost" style="padding:.3rem .7rem;font-size:.72rem;flex-shrink:0" onclick="closeModal('viewModal')">✕</button>
      </div>
      <p id="viewBody"></p>
      <div id="viewAttachment"></div>
    </div>
  </div>

  <!-- Edit / New Guide Modal -->
  <div class="modal-overlay" id="guideModal">
    <div class="modal" style="max-width:520px;max-height:90vh;overflow-y:auto">
      <h3 id="guideModalTitle">New Guide</h3>
      <input type="hidden" id="editGuideId"/>
      <input type="hidden" id="existingAttachment"/>
      <div class="form-group"><label>Title</label><input type="text" id="guideTitle" placeholder="Guide title…"/></div>
      <div class="form-group">
        <label>Category</label>
        <select id="guideCategory">
          <option>Mythic Plunder</option>
          <option>Castle Crashers GE</option>
          <option>General</option>
        </select>
      </div>
      <div class="form-group"><label>Content</label><textarea id="guideBody" rows="5" placeholder="Write your guide here…"></textarea></div>
      <div class="form-group">
        <label>Attachment (Image or PDF)</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept="image/*,.pdf" onchange="handleFile(this.files[0])"/>
          <div class="ua-icon">📎</div>
          <div class="ua-label">Click or drag an image / PDF here</div>
        </div>
        <div class="upload-preview" id="uploadPreview" style="display:none"></div>
      </div>
      <div class="form-group"><label>Author</label><input type="text" id="guideAuthor" placeholder="Your name"/></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal('guideModal');resetGuideForm()">Cancel</button>
        <button class="btn btn-gold"  onclick="saveGuide()">Save</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    buildNav("guides.html");

    const CAT_BADGE = {
      "Mythic Plunder":     '<span class="badge badge-gold">Mythic Plunder</span>',
      "Castle Crashers GE": '<span class="badge badge-blue">Castle Crashers GE</span>',
      "General":            '<span class="badge badge-muted">General</span>',
    };

    let activeFilter = "All";
    let pendingFile  = null; // { dataUrl, type, name }

    // ── File handling ──────────────────────────────────────
    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        pendingFile = { dataUrl: e.target.result, type: file.type, name: file.name };
        showPreview(pendingFile);
      };
      reader.readAsDataURL(file);
    }

    function showPreview(f) {
      const preview = document.getElementById("uploadPreview");
      const isImage = f.type.startsWith("image/");
      preview.style.display = "flex";
      preview.innerHTML = isImage
        ? `<img src="${f.dataUrl}" alt="preview"/><span class="up-name">${f.name}</span><span class="up-remove" onclick="clearFile()">Remove</span>`
        : `<span style="font-size:1.4rem">📄</span><span class="up-name">${f.name}</span><span class="up-remove" onclick="clearFile()">Remove</span>`;
    }

    function clearFile() {
      pendingFile = null;
      document.getElementById("existingAttachment").value = "";
      document.getElementById("uploadPreview").style.display = "none";
      document.getElementById("uploadPreview").innerHTML = "";
      document.getElementById("fileInput").value = "";
    }

    // Drag-over styling
    const ua = document.getElementById("uploadArea");
    ua.addEventListener("dragover",  e => { e.preventDefault(); ua.classList.add("dragover"); });
    ua.addEventListener("dragleave", () => ua.classList.remove("dragover"));
    ua.addEventListener("drop", e => {
      e.preventDefault(); ua.classList.remove("dragover");
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    // ── Filters ────────────────────────────────────────────
    function getCategories() { return ["All", ...new Set(DB.get("guides").map(g => g.category))]; }

    function renderFilters() {
      document.getElementById("filterBar").innerHTML = getCategories().map(c =>
        `<button class="filter-btn ${c===activeFilter?'active':''}" onclick="setFilter('${c}')">${c}</button>`
      ).join("");
    }

    function setFilter(cat) { activeFilter = cat; renderFilters(); renderGuides(); }

    // ── Guide list ─────────────────────────────────────────
    function attachmentThumb(att) {
      if (!att) return "";
      if (att.type.startsWith("image/"))
        return `<img src="${att.dataUrl}" class="guide-thumb" alt="attachment"/>`;
      return `<a href="${att.dataUrl}" download="${att.name}" class="guide-pdf-link">📄 ${att.name}</a>`;
    }

    function renderGuides() {
      const guides = DB.get("guides").filter(g => activeFilter==="All" || g.category===activeFilter);
      document.getElementById("guidesGrid").innerHTML = guides.length
        ? guides.map(g => `
          <div class="card guide-card">
            ${CAT_BADGE[g.category]||`<span class="badge badge-muted">${g.category}</span>`}
            ${g.attachment ? attachmentThumb(g.attachment) : ""}
            <h3>${g.title}</h3>
            <p>${g.body}</p>
            <div class="guide-meta">By <strong style="color:var(--text)">${g.author}</strong> · ${g.date}</div>
            <div class="guide-actions">
              <button class="btn btn-gold"   style="padding:.35rem .8rem;font-size:.72rem" onclick="viewGuide(${g.id})">Read</button>
              <button class="btn btn-ghost"  style="padding:.35rem .8rem;font-size:.72rem" onclick="editGuide(${g.id})">Edit</button>
              <button class="btn btn-danger" style="padding:.35rem .8rem;font-size:.72rem" onclick="deleteGuide(${g.id})">Delete</button>
            </div>
          </div>`).join("")
        : `<div style="color:var(--muted);font-size:.9rem">No guides found.</div>`;
    }

    // ── View ───────────────────────────────────────────────
    function viewGuide(id) {
      const g = DB.get("guides").find(x => x.id===id);
      document.getElementById("viewCategory").textContent = g.category;
      document.getElementById("viewTitle").textContent    = g.title;
      document.getElementById("viewMeta").textContent     = `By ${g.author} · ${g.date}`;
      document.getElementById("viewBody").textContent     = g.body;

      const attEl = document.getElementById("viewAttachment");
      if (g.attachment) {
        if (g.attachment.type.startsWith("image/")) {
          attEl.innerHTML = `<img src="${g.attachment.dataUrl}" style="max-width:100%;border-radius:4px;border:1px solid var(--border)" alt="attachment"/>`;
        } else {
          attEl.innerHTML = `<a href="${g.attachment.dataUrl}" download="${g.attachment.name}" class="guide-pdf-link">📄 Download ${g.attachment.name}</a>`;
        }
      } else {
        attEl.innerHTML = "";
      }
      openModal("viewModal");
    }

    // ── Edit ───────────────────────────────────────────────
    function editGuide(id) {
      const g = DB.get("guides").find(x => x.id===id);
      document.getElementById("editGuideId").value   = g.id;
      document.getElementById("guideTitle").value    = g.title;
      document.getElementById("guideCategory").value = g.category;
      document.getElementById("guideBody").value     = g.body;
      document.getElementById("guideAuthor").value   = g.author;
      document.getElementById("guideModalTitle").textContent = "Edit Guide";
      // Restore existing attachment
      if (g.attachment) {
        document.getElementById("existingAttachment").value = "1";
        pendingFile = g.attachment;
        showPreview(g.attachment);
      }
      openModal("guideModal");
    }

    // ── Delete ─────────────────────────────────────────────
    function deleteGuide(id) {
      if (!confirm("Delete this guide?")) return;
      DB.set("guides", DB.get("guides").filter(g => g.id!==id));
      renderFilters(); renderGuides();
    }

    // ── Save ───────────────────────────────────────────────
    function saveGuide() {
      const guides = DB.get("guides");
      const id     = document.getElementById("editGuideId").value;

      // Determine attachment: new file > existing > none
      let attachment = null;
      if (pendingFile) {
        attachment = pendingFile;
      } else if (id && document.getElementById("existingAttachment").value) {
        attachment = (guides.find(g => g.id===Number(id)) || {}).attachment || null;
      }

      const entry = {
        id:          id ? Number(id) : nextId(guides),
        title:       document.getElementById("guideTitle").value.trim()    || "Untitled",
        category:    document.getElementById("guideCategory").value,
        body:        document.getElementById("guideBody").value.trim()     || "",
        author:      document.getElementById("guideAuthor").value.trim()   || "Unknown",
        date:        today(),
        attachment,
      };
      if (id) { const i = guides.findIndex(g => g.id===Number(id)); guides[i]=entry; }
      else    { guides.push(entry); }
      DB.set("guides", guides);
      closeModal("guideModal"); resetGuideForm();
      renderFilters(); renderGuides();
    }

    function resetGuideForm() {
      ["editGuideId","guideTitle","guideBody","guideAuthor"].forEach(i => document.getElementById(i).value="");
      document.getElementById("guideCategory").value = "Mythic Plunder";
      document.getElementById("guideModalTitle").textContent = "New Guide";
      clearFile();
    }

    ["guideModal","viewModal"].forEach(id =>
      document.getElementById(id).addEventListener("click", e => {
        if (e.target.id===id) { closeModal(id); if (id==="guideModal") resetGuideForm(); }
      })
    );

    renderFilters();
    renderGuides();
  </script>
</body>
</html>
