<style>
.subsections{
  margin-bottom:1.5rem;
}

.sub-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:.75rem;
}

.sub-tile{
  display:flex;
  align-items:center;
  gap:.9rem;
  padding:1rem 1.1rem;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;
  text-decoration:none;
  transition:border-color .2s, background .2s;
}

.sub-tile:hover{
  border-color:rgba(201,168,76,.35);
  background:rgba(201,168,76,.05);
}

.sub-emoji{
  font-size:1.35rem;
}

.sub-label{
  font-family:'Rajdhani',sans-serif;
  font-size:1rem;
  font-weight:700;
  letter-spacing:.05em;
  text-transform:uppercase;
  color:var(--text);
}
</style>
</head>

<body>

<nav id="mainNav">
  <a class="nav-logo" href="index.html">NATO [GBR]</a>
  <ul></ul>
</nav>

<div class="page fade-up">
  <div class="page-header" style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:1rem">
    <div>
      <div class="page-label">Strategy & How-to</div>
      <div class="page-title">Guides</div>
      <div class="page-divider"></div>
    </div>
  </div>

  <div class="subsections">
    <div class="sub-grid">
      <a class="sub-tile" href="events.html">
        <span class="sub-emoji">🗓️</span>
        <span class="sub-label">Events</span>
      </a>

      <a class="sub-tile" href="relic.html">
        <span class="sub-emoji">🗿</span>
        <span class="sub-label">Relic</span>
      </a>

      <a class="sub-tile" href="heroes.html">
        <span class="sub-emoji">🦸</span>
        <span class="sub-label">Heroes</span>
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</script>
